environment:
  sdk: ^3.11.4

dependencies:
  args: ^2.6.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^5.0.0

executables:
  flux: flux

dependency_overrides:
  flux_core:
    path: ../packages/flux_core